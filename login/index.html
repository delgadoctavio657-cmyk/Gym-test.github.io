<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - PowerFit Gym (Fallback)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/stilo.css">
  </head>
  <body class="auth-page">
    <nav class="navbar navbar-default">
      <div class="container-fluid">
        <div class="navbar-header">
          <a class="navbar-brand" href="../index.html#inicio">PowerFit Gym</a>
        </div>
      </div>
    </nav>

    <main class="auth-wrap">
      <section class="auth-card" aria-labelledby="loginTitle">
        <div class="auth-card-header">
          <h2 id="loginTitle">Login (Fallback estático)</h2>
          <p>Si el servidor no procesa PHP, use este formulario como referencia o contacte a info@powerfitgym.com.</p>
        </div>

        <div id="message" style="max-width:540px;margin:0 auto 20px;text-align:center;color:#b00;"></div>

        <form id="loginForm" style="max-width:540px;margin:0 auto;">
          <div class="form-group">
            <label for="Nombre">Nombre</label>
            <input name="Nombre" type="text" maxlength="100" class="form-control" id="Nombre" placeholder="Introduce tu nombre" required>
          </div>

          <div class="form-group">
            <label for="Correo">Correo electrónico</label>
            <input name="Correo" type="email" maxlength="255" class="form-control" id="Correo" placeholder="Introduce tu correo electrónico" required>
          </div>

          <button type="submit" class="btn btn-gym btn-lg btn-block">Entrar</button>
        </form>

        <p style="text-align:center;margin-top:14px;">Si el backend falla, consulte <a href="error.html">la página de ayuda</a>.</p>
      </section>
    </main>

    <script src="https://code.jquery.com/jquery-1.11.3.min.js"></script>
    <script>
      document.getElementById('loginForm').addEventListener('submit', function (e) {
        e.preventDefault();
        var form = this;
        var data = new FormData(form);

        // Try to POST to PHP endpoint; if unavailable, redirect to error.html
        fetch('index.php', { method: 'POST', body: data, credentials: 'same-origin' })
          .then(function (resp) {
            if (!resp.ok) throw new Error('no-backend');
            return resp.text();
          })
          .then(function (html) {
            document.open(); document.write(html); document.close();
          })
          .catch(function () {
            window.location = 'error.html';
          });
      });
    </script>
  </body>
</html>
